name: Rust

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install GTK dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libgdk-pixbuf2.0-dev \
          libglib2.0-dev \
          libcairo2-dev \
          pkg-config

    - name: Build
      run: cargo build --release --verbose

    - name: Prepare Release Package
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cp target/release/tmtcopen resources/
        
        chmod +x resources/kurulum.sh
        
        cd resources
        zip -r ../tmtcopen.zip . *
        cd ..

    - name: Upload Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: tmtcopen.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}