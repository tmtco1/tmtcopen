name: Release Build

on:
  push:
    tags:
      - 'v*' # Sadece v1.0, v2.1.3 gibi tag'lerde çalışır

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: proje_adiniz
            asset_name: proje-linux-amd64
          - os: windows-latest
            artifact_name: proje_adiniz.exe
            asset_name: proje-windows-amd64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-chain@stable

    - name: Build Release
      run: cargo build --release

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: target/release/${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}